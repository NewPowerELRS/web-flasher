name: Deploy Web Flasher

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip curl

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get official ELRS artifacts
        run: |
          bash get_artifacts.sh

      - name: Patch NewPower target
        run: |
          node scripts/patch-targets.cjs

      - name: Verify NewPower target
        run: |
          node -e "const t=require('./public/assets/firmware/hardware/targets.json'); console.log(t.newpower.name); console.log(Object.keys(t.newpower.rx_2400));"

      - name: Install dependencies
        run: |
          npm install

      - name: Build
        run: |
          npm run build

      - name: Verify built targets
        run: |
          grep -i "newpower" dist/assets/firmware/hardware/targets.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
