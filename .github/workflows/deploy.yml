- name: Download ELRS firmware artifacts
  run: bash ./get_artifacts.sh

- name: Patch custom hardware targets
  run: node scripts/patch-targets.cjs

- name: Verify NewPower target exists
  run: |
    node -e "const t=require('./public/assets/firmware/hardware/targets.json'); if(!t.NewPower){throw new Error('NewPower missing')} console.log(t.NewPower.name)"

- name: Build
  run: npm run build
